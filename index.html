<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Thing Outlet</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    body {
      background: #efefef;
      font-family: Inter, sans-serif;
    }

    .card {
      background: #d9d9d9;
      border-radius: 24px;
      transform-style: preserve-3d;
      transition: transform .3s ease, box-shadow .3s ease;
      box-shadow:
        12px 12px 25px rgba(0,0,0,.08),
        -10px -10px 20px rgba(255,255,255,.7);
    }

    .card:hover {
      transform: translateY(-8px) rotateX(6deg);
      box-shadow:
        18px 18px 30px rgba(0,0,0,.12),
        -12px -12px 20px rgba(255,255,255,.8);
    }

    .hero-btn {
      background: linear-gradient(135deg, #ffd600, #f7b500);
      border-radius: 999px;
      box-shadow: 0 12px 20px rgba(255, 193, 7, .35);
      transition: .2s;
    }

    .hero-btn:active {
      transform: scale(.96);
    }

    .nav-btn {
      transition: .25s;
    }

    .nav-btn:hover {
      transform: translateY(-6px);
      color: #f4c400;
    }

    .active-nav {
      color: #f4c400;
      filter: drop-shadow(0 8px 10px rgba(244,196,0,.4));
    }
  </style>
</head>

<body class="pb-28">

  <div class="max-w-6xl mx-auto p-4 md:p-8">

    <!-- Header -->

    <button class="hero-btn w-full py-5 md:py-6 text-xl font-bold text-gray-800">
      🛍️ Thing Outlet
    </button>

    <p class="text-center text-gray-500 mt-3 mb-8">
      Discover trending products at outlet prices
    </p>

    <!-- Category Grid -->

    <div class="grid grid-cols-2 gap-5">

      <div class="card p-5 h-44 md:h-56 flex flex-col justify-end">
        <i class="fa-solid fa-shirt text-3xl text-gray-700 mb-3"></i>
        <h3 class="font-semibold">Fashion</h3>
      </div>

      <div class="card p-5 h-36 md:h-48 flex flex-col justify-end">
        <i class="fa-solid fa-mobile-screen text-3xl text-gray-700 mb-3"></i>
        <h3 class="font-semibold">Electronics</h3>
      </div>

      <div class="card p-5 h-36 md:h-48 flex flex-col justify-end">
        <i class="fa-solid fa-couch text-3xl text-gray-700 mb-3"></i>
        <h3 class="font-semibold">Home</h3>
      </div>

      <div class="card p-5 h-28 md:h-36 flex flex-col justify-end">
        <i class="fa-solid fa-gift text-3xl text-gray-700 mb-3"></i>
        <h3 class="font-semibold">Deals</h3>
      </div>

    </div>

    <!-- Featured -->

    <div class="card p-6 mt-7 h-36 md:h-48 flex items-center">
      <div>
        <p class="text-sm text-gray-500">Limited Offer</p>
        <h2 class="text-2xl font-bold text-gray-800">
          Up to 70% OFF
        </h2>
        <button class="mt-3 bg-yellow-400 px-4 py-2 rounded-full font-medium">
          Shop Now
        </button>
      </div>
    </div>

    <!-- Banner -->

    <div class="card mt-8 p-6 h-24 md:h-32 flex items-center justify-between">

      <div>
        <h3 class="font-bold text-lg">Today's Flash Sale</h3>
        <p class="text-gray-500 text-sm">Best prices for 24 hours only</p>
      </div>

      <i class="fa-solid fa-bolt text-4xl text-yellow-500"></i>

    </div>

    <!-- Products -->

    <div class="grid grid-cols-3 gap-4 mt-10">

      <div class="card p-4 aspect-square flex flex-col justify-center items-center">
        <i class="fa-solid fa-headphones text-3xl mb-3"></i>
        <span class="text-sm font-medium">Audio</span>
      </div>

      <div class="card p-4 aspect-square flex flex-col justify-center items-center">
        <i class="fa-solid fa-laptop text-3xl mb-3"></i>
        <span class="text-sm font-medium">Laptops</span>
      </div>

      <div class="card p-4 aspect-square flex flex-col justify-center items-center">
        <i class="fa-solid fa-watch-smart text-3xl mb-3"></i>
        <span class="text-sm font-medium">Wearables</span>
      </div>

    </div>

  </div>

  <!-- Bottom Navigation -->

  <nav class="fixed bottom-0 left-0 right-0 bg-white/70 backdrop-blur-lg border-t border-gray-200">

    <div class="max-w-md mx-auto flex justify-around py-5">

      <button class="nav-btn active-nav">
        <i class="fa-solid fa-house text-2xl"></i>
      </button>

      <button class="nav-btn">
        <i class="fa-solid fa-star text-2xl"></i>
      </button>

      <button class="nav-btn">
        <i class="fa-solid fa-user text-2xl"></i>
      </button>

    </div>

  </nav>

  <script>
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {

      card.addEventListener("mousemove", (e) => {

        const rect = card.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateY = ((x / rect.width) - 0.5) * 14;
        const rotateX = ((y / rect.height) - 0.5) * -14;

        card.style.transform =
          `perspective(1000px)
           rotateX(${rotateX}deg)
           rotateY(${rotateY}deg)
           translateY(-8px)`;
      });

      card.addEventListener("mouseleave", () => {
        card.style.transform = "";
      });
    });
  </script>

</body>
</html>
